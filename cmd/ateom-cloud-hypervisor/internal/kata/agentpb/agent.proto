// Minimal wire-compatible mirror of the kata-agent ttrpc API surface
// ateom-cloud-hypervisor needs after a CH snapshot restore: updating the
// restored guest's network interface and routes to the new pod's addresses.
//
// Field numbers and types mirror kata-containers 3.31.0
// src/libs/protocols/protos/{agent,types}.proto (Apache-2.0). The service is
// NOT declared here; calls go through ttrpc.Client.Call with the literal
// method names ("grpc.AgentService", "UpdateInterface"/"UpdateRoutes") so no
// ttrpc codegen plugin is required. kata's messages live in proto packages
// "grpc" and "types"; only field numbers matter on the wire, so they are
// flattened into this single package (type registration names differ, which
// is fine — names are never transmitted).

syntax = "proto3";

package ateomkataagent;

option go_package = "github.com/agent-substrate/substrate/cmd/ateom-cloud-hypervisor/internal/kata/agentpb";

enum IPFamily {
  v4 = 0;
  v6 = 1;
}

message IPAddress {
  IPFamily family = 1;
  string address = 2;
  string mask = 3;
}

message Interface {
  string device = 1;
  string name = 2;
  repeated IPAddress IPAddresses = 3;
  uint64 mtu = 4;
  string hwAddr = 5;
  string devicePath = 6;
  string type = 7;
  uint32 raw_flags = 8;
}

message Route {
  string dest = 1;
  string gateway = 2;
  string device = 3;
  string source = 4;
  uint32 scope = 5;
  IPFamily family = 6;
  uint32 flags = 7;
  uint32 mtu = 8;
}

message Routes {
  repeated Route Routes = 1;
}

message UpdateInterfaceRequest {
  Interface interface = 1;
}

message UpdateRoutesRequest {
  Routes routes = 1;
}
